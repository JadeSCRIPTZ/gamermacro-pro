name: Build GamerMacro Pro EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyautogui pillow pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "GamerMacroPro" gamermacro.py

      - name: Get date
        id: date
        run: echo "date=$(Get-Date -Format 'yyyy-MM-dd')" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-${{ steps.date.outputs.date }}
          name: "GamerMacro Pro v2.0 — ${{ steps.date.outputs.date }}"
          body: |
            ## 🎮 GamerMacro Pro — Fishing Edition
            Design complet nou cu UI cyberpunk.

            ### ⬇️ Download
            Click pe **GamerMacroPro.exe** — fara Python instalat!

            ### Features
            - Pixel detection cu delay de reactie configurabil
            - Mod Natural (8% skip)
            - State machine RESET/WATCH
            - Design cyberpunk HUD
          files: dist/GamerMacroPro.exe
